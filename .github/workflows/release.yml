name: Release

# Publishes to PyPI when a version tag (vX.Y.Z) is pushed. Tags are produced by
# `cz bump`, which also updates the version and CHANGELOG.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata + README rendering
        run: python -m twine check dist/*
      - name: Smoke-test the built wheel
        run: |
          python -m pip install dist/*.whl
          agent2model --version
          agent2model --help
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agent2model/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC); no token secret needed.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
