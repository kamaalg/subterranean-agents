site_name: agent2model
site_description: Turn your LangGraph/CrewAI agent into a small model that runs with no orchestrator — near-frontier quality at a fraction of the inference cost.
repo_url: https://github.com/kamaalg/agent2model
repo_name: kamaalg/agent2model
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - IR spec reference: ir-spec.md
  - LangGraph adapter: adapters.md
  - Training guide: training.md
  - Evaluation guide: evaluation.md
  - Cloud quickstart: cloud-quickstart.md
  - Cloud deployment: cloud.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
